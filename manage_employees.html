<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Employees | PayslipPro</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      .manage-container {
        max-width: 1200px;
        margin: 2rem auto;
        padding: 0 1rem;
      }

      .manage-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        background: #fff;
        padding: 1.5rem;
        border-radius: 1rem;
        box-shadow: var(--shadow);
      }

      .search-box {
        position: relative;
        flex: 1;
        max-width: 400px;
      }

      .search-box input {
        width: 100%;
        padding-left: 2.5rem;
      }

      .search-icon {
        position: absolute;
        left: 0.75rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
      }

      .table-card {
        background: #fff;
        border-radius: 1rem;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .employee-table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
      }

      .employee-table th {
        background: #f8fafc;
        padding: 1rem;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border);
      }

      .employee-table td {
        padding: 1rem;
        border-bottom: 1px solid var(--border);
        font-size: 0.875rem;
        vertical-align: middle;
      }

      .emp-info {
        display: flex;
        flex-direction: column;
      }

      .emp-name {
        font-weight: 600;
        color: var(--text-main);
      }

      .emp-id {
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      .action-btns {
        display: flex;
        gap: 0.5rem;
      }

      .edit-btn {
        color: var(--primary);
        background: rgba(30, 64, 175, 0.1);
      }

      .edit-btn:hover {
        background: rgba(30, 64, 175, 0.2);
      }

      .delete-btn {
        color: var(--accent);
        background: rgba(239, 68, 68, 0.1);
      }

      .delete-btn:hover {
        background: rgba(239, 68, 68, 0.2);
      }

      .status-badge {
        padding: 0.25rem 0.5rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 500;
        background: rgba(16, 185, 129, 0.1);
        color: var(--success);
      }

      .empty-state {
        padding: 4rem;
        text-align: center;
        color: var(--text-muted);
      }

      .loading-spinner {
        display: flex;
        justify-content: center;
        padding: 4rem;
      }

      /* Modal specific overrides for edit */
      .modal-body .form-row {
        margin-bottom: 1rem;
      }

      @media (max-width: 768px) {
        .manage-header {
          flex-direction: column;
          gap: 1rem;
          align-items: stretch;
        }
        .search-box {
          max-width: none;
        }
        .hide-mobile {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="manage-container">
      <div class="manage-header">
        <div class="header-title">
          <div class="logo-text"><span>Manage</span> Employees</div>
          <p style="font-size: 0.875rem; color: var(--text-muted)">
            View, edit or remove staff members.
          </p>
        </div>
        <div class="header-actions" style="display: flex; gap: 0.75rem">
          <button id="openAddModalBtn" class="success-btn">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 5v14M5 12h14" />
            </svg>
            Add Employee
          </button>
          <a href="index.html" class="secondary-btn">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="m15 18-6-6 6-6" />
            </svg>
            Back to Generator
          </a>
        </div>
      </div>

      <div
        class="manage-header"
        style="
          margin-bottom: 1rem;
          background: transparent;
          padding: 0;
          box-shadow: none;
        "
      >
        <div class="search-box">
          <div class="search-icon">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.3-4.3" />
            </svg>
          </div>
          <input
            type="text"
            id="employeeSearch"
            placeholder="Search by name, ID, or email..."
          />
        </div>
        <div>
          <button id="refreshBtn" class="secondary-btn">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" />
              <path d="M21 3v5h-5" />
            </svg>
            Refresh
          </button>
        </div>
      </div>

      <div class="table-card">
        <div id="loadingState" class="loading-spinner">
          <svg
            width="48"
            height="48"
            viewBox="0 0 24 24"
            fill="none"
            stroke="var(--primary)"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="animate-spin"
          >
            <line x1="12" y1="2" x2="12" y2="6" />
            <line x1="12" y1="18" x2="12" y2="22" />
            <line x1="4.93" y1="4.93" x2="7.76" y2="7.76" />
            <line x1="16.24" y1="16.24" x2="19.07" y2="19.07" />
            <line x1="2" y1="12" x2="6" y2="12" />
            <line x1="18" y1="12" x2="22" y2="12" />
            <line x1="4.93" y1="19.07" x2="7.76" y2="16.24" />
            <line x1="16.24" y1="7.76" x2="19.07" y2="4.93" />
          </svg>
        </div>
        <table class="employee-table" id="employeeTable" style="display: none">
          <thead>
            <tr>
              <th>Employee</th>
              <th class="hide-mobile">Designation</th>
              <th class="hide-mobile">Contact</th>
              <th>Salary</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="employeeTableBody">
            <!-- Dynamic Rows -->
          </tbody>
        </table>
        <div id="emptyState" class="empty-state" style="display: none">
          <p>No employees found.</p>
        </div>
      </div>
    </div>

    <!-- Add Employee Modal -->
    <div id="employeeModal" class="modal-overlay">
      <div class="modal-content modal-lg">
        <div class="modal-header">
          <h3>Add New Employee</h3>
          <button class="close-btn" onclick="closeModal('employeeModal')">
            &times;
          </button>
        </div>
        <form id="addEmployeeForm">
          <div class="modal-body">
            <div class="form-row">
              <div class="form-group">
                <label>Full Name <span class="required-mark">*</span></label>
                <input
                  type="text"
                  id="newEmpName"
                  required
                  placeholder="e.g. John Doe"
                />
              </div>
              <div class="form-group">
                <label
                  >Employee ID <span class="required-mark">*</span>
                  <small>(From offer letter)</small></label
                >
                <input
                  type="text"
                  id="newEmpId"
                  required
                  placeholder="e.g. AC/OL/2025/01"
                />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Designation <span class="required-mark">*</span></label>
                <input
                  type="text"
                  id="newEmpDesignation"
                  required
                  placeholder="e.g. Software Engineer"
                />
              </div>
              <div class="form-group">
                <label
                  >Gross Salary (INR)
                  <span class="required-mark">*</span></label
                >
                <input
                  type="number"
                  id="newEmpGross"
                  min="0"
                  required
                  placeholder="e.g. 50000"
                />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Phone <span class="required-mark">*</span></label>
                <input
                  type="tel"
                  id="newEmpPhone"
                  required
                  placeholder="e.g. +91 9876543210"
                />
              </div>
              <div class="form-group">
                <label>Email <span class="required-mark">*</span></label>
                <input
                  type="email"
                  id="newEmpEmail"
                  required
                  placeholder="e.g. john@example.com"
                />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label
                  >Bank A/C (Last 4 Digits)
                  <span class="required-mark">*</span></label
                >
                <input
                  type="text"
                  id="newEmpBank"
                  maxlength="4"
                  required
                  placeholder="e.g. 1234"
                />
              </div>
            </div>
            <div class="form-group">
              <label>Address <span class="required-mark">*</span></label>
              <textarea
                id="newEmpAddress"
                rows="2"
                style="resize: none; height: 80px"
                required
                placeholder="e.g. 123 Main St, City"
              ></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="secondary-btn"
              onclick="closeModal('employeeModal')"
            >
              Cancel
            </button>
            <button type="submit" class="success-btn">Save Employee</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Edit Employee Modal -->
    <div id="editModal" class="modal-overlay">
      <div class="modal-content modal-lg">
        <div class="modal-header">
          <h3>Edit Employee Details</h3>
          <button class="close-btn" onclick="closeModal('editModal')">
            &times;
          </button>
        </div>
        <form id="editEmployeeForm">
          <input type="hidden" id="editEmpIndex" />
          <div class="modal-body">
            <div class="form-row">
              <div class="form-group">
                <label>Full Name <span class="required-mark">*</span></label>
                <input type="text" id="editEmpName" required />
              </div>
              <div class="form-group">
                <label>Employee ID <span class="required-mark">*</span></label>
                <input type="text" id="editEmpId" required />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Designation <span class="required-mark">*</span></label>
                <input type="text" id="editEmpDesignation" required />
              </div>
              <div class="form-group">
                <label
                  >Gross Salary (INR)
                  <span class="required-mark">*</span></label
                >
                <input type="number" id="editEmpGross" min="0" required />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Phone <span class="required-mark">*</span></label>
                <input type="tel" id="editEmpPhone" required />
              </div>
              <div class="form-group">
                <label>Email <span class="required-mark">*</span></label>
                <input type="email" id="editEmpEmail" required />
              </div>
            </div>
            <div class="form-group">
              <label
                >Bank A/C (Last 4 Digits)
                <span class="required-mark">*</span></label
              >
              <input type="text" id="editEmpBank" maxlength="4" required />
            </div>
            <div class="form-group">
              <label>Address <span class="required-mark">*</span></label>
              <textarea
                id="editEmpAddress"
                rows="2"
                style="resize: none; height: 80px"
                required
              ></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="secondary-btn"
              onclick="closeModal('editModal')"
            >
              Cancel
            </button>
            <button type="submit" class="success-btn">Update Employee</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Delete Employee</h3>
          <button class="close-btn" onclick="closeModal('deleteModal')">
            &times;
          </button>
        </div>
        <div class="modal-body text-center">
          <div style="color: var(--accent); margin-bottom: 1rem">
            <svg
              width="48"
              height="48"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M3 6h18" />
              <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
              <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
              <line x1="10" y1="11" x2="10" y2="17" />
              <line x1="14" y1="11" x2="14" y2="17" />
            </svg>
          </div>
          <p>
            Are you sure you want to delete
            <strong><span id="deleteEmpName"></span></strong>?
          </p>
          <p
            style="
              font-size: 0.8125rem;
              margin-top: 0.5rem;
              color: var(--text-muted);
            "
          >
            This action cannot be undone.
          </p>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="secondary-btn"
            onclick="closeModal('deleteModal')"
          >
            Cancel
          </button>
          <button
            type="button"
            id="confirmDeleteBtn"
            class="success-btn"
            style="background-color: var(--accent)"
          >
            Yes, Delete
          </button>
        </div>
      </div>
    </div>

    <!-- Success/Notification Modal -->
    <div id="successModal" class="modal-overlay">
      <div class="modal-content text-center">
        <div class="success-icon" id="statusIcon"></div>
        <h3 id="statusTitle">Success!</h3>
        <p
          id="statusMessage"
          style="margin-bottom: 2rem; color: var(--text-muted)"
        ></p>
        <div class="modal-footer" style="justify-content: center">
          <button
            onclick="closeModal('successModal')"
            class="success-btn"
            style="width: 120px"
          >
            Done
          </button>
        </div>
      </div>
    </div>

    <script src="manage_employees.js"></script>
  </body>
</html>
